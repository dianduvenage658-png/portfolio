<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #16a34a;
    }

    .card {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome to My Site 🔥</h1>
    <p>This is not basic anymore… this is clean.</p>

    <a class="btn" href="#">Click Me</a>

    <div class="card">
      <h3>About</h3>
      <p>This website was built by me 😭</p>
    </div>
  </div>

</body>
</html>
